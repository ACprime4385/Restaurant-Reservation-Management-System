name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'

jobs:
  # ============================================================================
  # Lint: Check code quality with ESLint
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    name: Lint (ESLint)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: |
          npm install
          npm --prefix server install
          npm --prefix client install

      - name: Lint server
        run: npm --prefix server run lint
        continue-on-error: false

      - name: Lint client
        run: npm --prefix client run lint
        continue-on-error: false

  # ============================================================================
  # Test: Run backend tests with Jest and Supertest
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    name: Test (Jest)
    needs: lint

    services:
      # MongoDB with replica set (required for ACID transactions)
      mongodb:
        image: mongo:7
        options: >-
          --entrypoint mongod
          --replSet rs0
          --bind_ip_all
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: |
          npm install
          npm --prefix server install

      - name: Initialize MongoDB replica set
        run: |
          echo "Waiting for MongoDB to start..."
          for i in $(seq 1 15); do
            docker exec $(docker ps -q) mongosh --quiet --eval 'db.runCommand({ping:1}).ok' 2>/dev/null && break
            echo "Attempt $i - waiting..."
            sleep 2
          done
          echo "Initializing replica set..."
          docker exec $(docker ps -q) mongosh --quiet --eval 'rs.initiate({_id:"rs0",members:[{_id:0,host:"localhost:27017"}]})'
          sleep 3
          echo "=== Replica set status ==="
          docker exec $(docker ps -q) mongosh --quiet --eval 'rs.status().ok'

      - name: Run server tests
        run: npm --prefix server run test
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/restaurant-reservation-test?retryWrites=true
          JWT_SECRET: test-secret-key-for-jest
        continue-on-error: false

  # ============================================================================
  # Build: Verify both backend and frontend builds complete without errors
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    name: Build
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Build server
        run: |
          npm --prefix server install
          npm --prefix server run build
        continue-on-error: false

      - name: Build client
        run: |
          npm --prefix client install
          npm --prefix client run build
        env:
          VITE_API_URL: https://restaurant-api.onrender.com/api
        continue-on-error: false

      - name: Verify build outputs
        run: |
          if [ ! -d "client/dist" ]; then
            echo "Error: client/dist directory not created"
            exit 1
          fi
          echo "Build verification successful"

  # ============================================================================
  # Summary: Job that shows overall CI status
  # ============================================================================
  ci-summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [lint, test, build]
    if: always()

    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "CI Pipeline Failed"
            exit 1
          fi
          echo "✓ CI Pipeline Passed"
